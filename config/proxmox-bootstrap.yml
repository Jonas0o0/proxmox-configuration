# Source de verite du bootstrap Proxmox.
# Les secrets restent hors Git et doivent etre fournis via GitHub Actions ou des fichiers locaux sur le node.

base:
  proxmox_hostname: pve
  timezone: Europe/Paris

apt:
  channel: no-subscription
  update: true
  dist_upgrade: false
  packages:
    - curl
    - git
    - vim
    - jq
    - unzip
    - ifupdown2

ssh:
  hardening: false
  password_auth: "no"
  permit_root_login: prohibit-password

network:
  # Passe a true quand tu veux que Git gere /etc/network/interfaces.
  enabled: false
  reload: false

  management:
    iface: eno1
    bridge: vmbr0
    address: 192.168.1.10/24
    gateway: 192.168.1.1
    dns:
      - 192.168.1.1
      - 1.1.1.1

  bridge:
    vlan_aware: true
    vids: 2-4094

  # Format: "bridge:address:ports:comment"
  # Utilise "none" pour address ou ports si vide.
  extra_bridges:
    # - "vmbr20:192.168.20.1/24:none:services"
    # - "vmbr30:none:none:lab"

storage:
  snippets:
    enabled: true
    id: snippets
    path: /var/lib/vz/snippets

  backup_dir:
    enabled: false
    id: backup-local
    path: /var/lib/vz/dump

pbs:
  enabled: false
  storage_id: pbs
  server: pbs.example.local
  datastore: datastore
  username: root@pam
  password_file: /root/.pbs-password
  fingerprint: ""

backup:
  job:
    enabled: false
    id: daily-all
    storage: backup-local
    schedule: daily
    mode: snapshot
    vmid: all
    prune: keep-daily=7,keep-weekly=4,keep-monthly=3

terraform:
  # En GitOps, le bootstrap est le point d'entree unique et lance aussi Terraform.
  enabled: true
  install: true
  version: 1.15.5
  bin_dir: /usr/local/bin
  dir: /root/prox/terraform
  plan_file: tfplan
  auto_approve: true
