# Copie ce fichier vers inventory/proxmox.yml et adapte-le a ton installation.
# Ne mets pas de secrets dans ce fichier s'il est versionne.

site:
  name: homelab
  timezone: Europe/Paris
  domain: home.arpa

proxmox:
  endpoint: https://proxmox.example.local:8006/api2/json
  node: pve
  api_token_env: PROXMOX_API_TOKEN

network:
  management:
    bridge: vmbr0
    interface: eno1
    address: 192.168.1.10/24
    gateway: 192.168.1.1
    dns:
      - 192.168.1.1
      - 1.1.1.1

  subnets:
    - name: lan
      vlan_id: null
      cidr: 192.168.1.0/24
      gateway: 192.168.1.1
      bridge: vmbr0

    - name: services
      vlan_id: 20
      cidr: 192.168.20.0/24
      gateway: 192.168.20.1
      bridge: vmbr0

    - name: lab
      vlan_id: 30
      cidr: 192.168.30.0/24
      gateway: 192.168.30.1
      bridge: vmbr0

storage:
  iso: local
  vm_disks: local-lvm
  backups: local

templates:
  - name: ubuntu-24.04-cloudinit
    vm_id: 9000
    image_url: https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img
    datastore: local

vms:
  - name: wireguard
    vm_id: 101
    template: ubuntu-24.04-cloudinit
    node: pve
    cpu_cores: 2
    memory_mb: 2048
    disk_gb: 20
    subnet: services
    address: 192.168.20.10/24
    gateway: 192.168.20.1
    tags:
      - vpn
      - terraform
    startup:
      order: 1
      up_delay: 30
      down_delay: 30

  - name: kanboard
    vm_id: 102
    template: ubuntu-24.04-cloudinit
    node: pve
    cpu_cores: 2
    memory_mb: 2048
    disk_gb: 32
    subnet: services
    address: 192.168.20.20/24
    gateway: 192.168.20.1
    tags:
      - app
      - terraform

backups:
  default:
    enabled: true
    schedule: daily
    mode: snapshot
    retention:
      keep_daily: 7
      keep_weekly: 4
      keep_monthly: 3

  jobs:
    - name: services-daily
      target_storage: local
      include_vms:
        - wireguard
        - kanboard
